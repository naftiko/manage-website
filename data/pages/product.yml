    html: '<h2 class="max-width-650">Naftiko: the entry point</h2>'
    text: 'Naftiko: the entry point'
  attributes: {}
- id: 9c1d21f8-498f-609c-3801-a1b8f5892238
  type: text
  text:
    html: <div>Your workspace for designing, testing, and packaging governed capabilities.
      Naftiko turns complex integration logic into reusable, compliant modules your
      teams can trust.</div>
    text: Your workspace for designing, testing, and packaging governed capabilities.
      Naftiko turns complex integration logic into reusable, compliant modules your
      teams can trust.
  attributes: {}
