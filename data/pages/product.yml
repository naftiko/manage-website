- id: 82cd8058-1165-3db3-4aae-52c2da3cad55
  type: text
  text:
    html: <h2 class="align-text-left">From framework to fabric</h2>
    text: From framework to fabric
  attributes: {}
- id: 82cd8058-1165-3db3-4aae-52c2da3cad57
  type: text
  text:
    html: <div>Naftiko packages the open-source capability framework (Apache Limani)
      into a developer environment teams can actually ship with.</div>
    text: Naftiko packages the open-source capability framework (Apache Limani) into
      a developer environment teams can actually ship with.
  attributes: {}
- id: 82cd8058-1165-3db3-4aae-52c2da3cad59
  type: text
  text:
    html: '<div>Every module follows the same architecture: composable, policy-driven,
      and future-proof.</div>'
    text: 'Every module follows the same architecture: composable, policy-driven,
      and future-proof.'
  attributes: {}
- id: a6652fc8-8bd7-2057-aa58-0d8b4611f5c5
  type: text
  text:
    html: <div class="its-open-sourceready-community-driven-and-buil-2">Key design
      principles:</div>
    text: 'Key design principles:'
  attributes: {}
- id: 2c6de6f7-7fa5-22fc-117c-474a936a7082
  type: text
  text:
    html: <li><span class="semi-bold white" data-w-id="72158e0c-942a-efe0-a96f-c9c4c0d9b7a3">Governed
      by default —</span> Policies and compliance built into runtime.</li>
    text: Governed by default — Policies and compliance built into runtime.
  attributes: {}
- id: 2c6de6f7-7fa5-22fc-117c-474a936a7083
  type: text
  text:
    html: <li><span class="semi-bold white" data-w-id="dc31c70b-22de-14d1-a3d3-4e105c4c4e29">Observable</span>
      Costs — performance, and lineage surfaced automatically.</li>
    text: Observable Costs — performance, and lineage surfaced automatically.
  attributes: {}
- id: 2c6de6f7-7fa5-22fc-117c-474a936a7084
  type: text
  text:
    html: <li><span class="semi-bold white" data-w-id="7d3c3e0d-1fa0-aef4-1d7a-d540d93a620f">Composable</span>
      Each — capability can plug into another.</li>
    text: Composable Each — capability can plug into another.
  attributes: {}
