  type: text
  text:
    html: <div class="paragraph-24 white medium height-110">Framework</div>
    text: Framework
  attributes: {}
- id: d0915a25-b284-35df-5fac-cdc24ef9b7be
  type: text
  text:
    html: <div class="paragraph-18">Create, test, and package capabilities into Docker
      images. Model-driven, IDE-native, and built for AI-assisted development.</div>
    text: Create, test, and package capabilities into Docker images. Model-driven,
      IDE-native, and built for AI-assisted development.
  attributes: {}
