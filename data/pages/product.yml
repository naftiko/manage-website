  type: text
  text:
    html: <div class="paragraph-24 white medium height-110">Capabilities</div>
    text: Capabilities
  attributes: {}
- id: 459d9968-89cb-99f8-cdaf-7b5fe3fea899
  type: text
  text:
    html: <div class="paragraph-18">Declarative JSON or YAML&nbsp;capabilities that
      define your integrations across any data source or API, while aligning with
      business outcomes.</div>
    text: Declarative JSON or YAML capabilities that define your integrations across
      any data source or API, while aligning with business outcomes.
