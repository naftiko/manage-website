  text:
    html: <div class="paragraph-24 white medium height-110">Fabric</div>
    text: Fabric
  attributes: {}
- id: c4666523-0d57-9399-8226-8b8130f3f3fe
  type: text
  text:
    html: <div class="paragraph-18">The control plane for dashboards, observability,
      routing, and developer experience. All powered by open standards.</div>
    text: The control plane for dashboards, observability, routing, and developer
      experience. All powered by open standards.
  attributes: {}
- id: 396ad978-e009-6d49-42a0-5f33c14621d3
  type: text
  text:
    html: <h2 class="align-text-left">Built to scale through capabilities</h2>
    text: Built to scale through capabilities
  attributes: {}
- id: 162e04d8-17df-ed55-8a5b-7878df82436d
  type: text
  text:
    html: <div>Each integration or workflow built with Naftiko becomes a <span class="medium
      white-100" data-w-id="cda788da-4e56-27d9-23aa-34ea6090901b">capability</span>,
      a repeatable, governed pattern you can reuse across domains.</div>
    text: Each integration or workflow built with Naftiko becomes a capability, a
      repeatable, governed pattern you can reuse across domains.
  attributes: {}
- id: 5c813e60-ff10-def8-6f1c-0d82c792ec3b
  type: text
  text:
    html: '<div>From simple API calls to multi-cloud governance, each capability builds
      on the same foundation: <span class="medium white-100" data-w-id="50c74bc0-0327-3324-4ea3-5f20b238eaa0">Framework
      &amp;&nbsp;Fabric</span></div>'
    text: 'From simple API calls to multi-cloud governance, each capability builds
      on the same foundation: Framework & Fabric'
  attributes: {}
