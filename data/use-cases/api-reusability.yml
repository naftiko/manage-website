fieldData:
  use-case-name: Make your existing APIs work for AI
  subtitle: Embracing your legacy and meeting the demands of AI integration using
    your existing API investments is how you will get the work done.
  hero-card-content: <p id="">This use case is focused on encouraging the discoverability
    and reuse of existing APIs. It leverages existing API infrastructure to quantify
    what API, schema, and tooling reuse looks like, and to incentivize reuse across
    the software development lifecycle—reducing API sprawl and hardening the APIs
    that already exist.</p><p id="">Teams need to easily use existing API paths and
    operations as part of new integrations and automation, ensuring that paths, operations,
    and schema are available within IDEs and copilot tooling—meeting developers where
    they already work. API reusability empowers developers while also informing leadership
    about how APIs are being reused and where opportunities to refine and improve
    exist.</p>
  steadies-content: 'Naftiko organizes how capabilities work: the Framework sets the
    rules, the Engine enforces them at runtime, and the Fabric delivers monitoring,
    auditing, and reporting.'
  card-content--1: Define API domains, catalogs, and reuse policies
  card-content--2: Expose existing APIs to IDEs, copilots, and MCP without changing
    backends
  card-content--3: Track reuse, measure usage, and surface insights for teams and
    leadership
  gain-content--1: Unlock access to legacy APIs and data
  gain-content--2: Right-size and unify existing APIs
  gain-content--3: Leverage internal and third-party API catalogs
  gain-content--4: Extend OpenAPI definitions for MCP and AI tooling
  gain-content--5: Communicate API reuse clearly to leadership and teams
  cta-content: Discovery • Reuse • Consistency • Governance
