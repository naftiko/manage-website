fieldData:
  use-case-name: Coordinate AI the way your teams already work
  subtitle: Planning ahead for teams when it comes to discovery, security, and the
    other properties of the Agent-2-Agent specification helps steer the fleet in the
    same direction.
  hero-card-content: <p id="">This use case provides the data, skills, and capabilities
    internal artificial intelligence agents need to automate and orchestrate tasks
    while discovering and negotiating with other agents to accomplish specific goals.
    It employs the open-source Agent-2-Agent specification to securely and confidently
    enable agentic activity across operations.</p><p id="">As teams focus on responding
    to this AI moment and deploying MCP servers on top of existing APIs and other
    tooling, they need to begin understanding how to implement agentic automation
    and orchestration on top of MCP servers. Teams need structure and guidance when
    it comes to authentication and authorization, discovery, governance, and all the
    standardization required to deploy agents at scale.</p>
  steadies-content: 'Naftiko organizes how capabilities work: the Framework sets the
    rules, the Engine enforces them at runtime, and the Fabric delivers monitoring,
    auditing, and reporting.'
  card-content--1: Define agent capabilities, skills, and orchestration policies
  card-content--2: Execute A2A interactions and enforce authentication, authorization,
    and negotiation rules
  card-content--3: Monitor agent activity, message flows, decisions, and outcomes
  gain-content--1: Enable agents to discover and use internal capabilities
  gain-content--2: Standardize communication using the A2A protocol
  gain-content--3: Automate cross-system workflows without human bottlenecks
  gain-content--4: Reduce risk with governed, policy-driven orchestration
  gain-content--5: Gain visibility into agent decisions and interactions
  cta-content: Discovery • Security • Automation • Governance • Control
