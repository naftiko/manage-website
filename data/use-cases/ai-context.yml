fieldData:
  use-case-name: Give AI the organizational context it needs
  subtitle: AI without context is guesswork. Valuable data lives in SaaS tools, files,
    and systems your models can’t reach safely.
  hero-card-content: <p id="">This use case helps teams deliver consistent MCP servers
    across internal, public, and third-party APIs, as well as local SQL databases.
    Naftiko uses a domain-driven, declarative, and governed approach to right-size
    context windows and make data safely accessible to AI copilots and agents.</p><p
    id="">Teams can deliver MCP servers without needing to learn each API’s details.
    This use case establishes the foundation for securely integrating existing systems
    and data into AI workflows across the organization.</p>
  steadies-content: 'Naftiko organizes how capabilities work: the Framework sets the
    rules, the Engine enforces them at runtime, and the Fabric delivers monitoring,
    auditing, and reporting.'
  card-content--1: Define contextual data sources and MCP server models
  card-content--2: Generate governed MCP servers and enforce access rules
  card-content--3: Monitor context usage, freshness, and system interactions
  gain-content--1: Add enterprise data to copilots and agents
  gain-content--2: Create MCP servers without API expertise
  gain-content--3: Aggregate and curate context
  gain-content--4: Increase visibility across all data sources
  gain-content--5: Ensure governed, consistent AI access patterns
  cta-content: Discovery • Spending • Security • Change • Control
