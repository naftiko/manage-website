fieldData:
  use-case-name: Query APIs like they’re tables
  subtitle: Data lives in silos. Teams want insights now, but every new API means
    another custom connector.
  hero-card-content: <p id="">This use case seeks to consistently unlock the data
    companies depend on across multiple third-party SaaS providers and existing database
    connections via JDBC and ODBC. It ensures AI integrations have the data they require,
    even when that data is spread across internal systems, SaaS tools, and legacy
    databases.</p><p id="">Teams benefit from consistent SQL access to data sources,
    and extending this access to third-party SaaS enables them to provide the context,
    resources, and data needed for AI integrations across the enterprise. This use
    case delivers a unified, simplified approach to powering AI workflows with the
    data required within specific business domains.</p>
  steadies-content: 'Naftiko organizes how capabilities work: the Framework sets the
    rules, the Engine enforces them at runtime, and the Fabric delivers monitoring,
    auditing, and reporting.'
  card-content--1: Define data sources, schemas, and SQL access policies
  card-content--2: Provide JDBC/ODBC connections and federate SQL queries across systems
  card-content--3: Monitor data usage, freshness, and downstream consumption
  gain-content--1: Unlock SaaS data through SQL
  gain-content--2: Access internal and legacy systems using a unified SQL layer
  gain-content--3: Connect easily to dashboards, BI tools, and analytics workflows
  gain-content--4: Provide plug-and-play data access for data science and ML engineering
  gain-content--5: Enable AI integrations with consistent, governed SQL access
  cta-content: Discovery • Insights • Dashboards • Control
